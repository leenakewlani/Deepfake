<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Deepfake Detection</title>
<style>
body{font-family:Arial;background:#e8bcf0;display:flex;justify-content:center;align-items:center;height:100vh;margin:0}
.container{background:white;padding:30px;border-radius:20px;box-shadow:0 10px 40px rgba(0,0,0,.2);width:800px}
.btn{padding:10px 18px;border:none;border-radius:10px;background:#6a0dad;color:white;cursor:pointer}
.card{margin-top:20px;padding:20px;background:#f9f9f9;border-radius:12px}
.real{color:green;font-weight:bold}.fake{color:red;font-weight:bold}
</style>
</head>
<body>
<div class="container">
<h1>Deepfake Detection System</h1>
<p>Upload image and detect REAL vs FAKE</p>
<input type="file" id="fileInput" accept="image/*">
<button class="btn" onclick="uploadFile()">Predict</button>

<div class="card">
<p id="predictionText">Waiting...</p>
<p id="confidenceText">Confidence: --</p>
<p id="statusText">Ready</p>
</div>
</div>

<script>
async function uploadFile() {
  const file = document.getElementById("fileInput").files[0];
  if (!file) {
    alert("Please upload an image first");
    return;
  }

  const formData = new FormData();
  formData.append("file", file);

  document.getElementById("statusText").innerText = "Predicting...";

  try {
    const response = await fetch("/predict", {
      method: "POST",
      body: formData
    });

    const data = await response.json();

    const pred = document.getElementById("predictionText");
    pred.innerText = data.prediction;
    pred.className = data.prediction === "REAL" ? "real" : "fake";

    document.getElementById("confidenceText").innerText =
      "Confidence: " + data.confidence + "%";

    document.getElementById("statusText").innerText = "Done";
  } catch (e) {
    document.getElementById("statusText").innerText = "Error";
  }
}
</script>
</body>
</html>
